<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landmark Result</title>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Landmark Detection Result</h1>
        </header>

        <div class="result-card">
            <img src="/static/uploads/{{ filename }}" alt="Uploaded image" />
            <div class="details">
                <h2>{{ label }}</h2>
                <p><strong>Confidence:</strong> {{ '{:.2f}'.format(confidence * 100) }}%</p>
                {% if details %}
                <p><strong>Location:</strong> {{ details.location }}</p>
                <p><strong>Description:</strong> {{ details.description }}</p>
                {% endif %}
            </div>
        </div>

        <a class="back-button" href="/">Upload another image</a>
    </div>
</body>
</html>
